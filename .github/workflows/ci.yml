name: SENTRY CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: sentry_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env for CI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${OPENAI_API_KEY}
          LLM_MODEL=gpt-4
          EMBEDDING_MODEL=all-MiniLM-L6-v2
          CHROMA_PERSIST_DIR=./knowledge_base/vector_store
          CHROMA_COLLECTION_NAME=sentry_knowledge
          MIDDLEWARE_HOST=0.0.0.0
          MIDDLEWARE_PORT=8000
          DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@localhost:5432/sentry_db_test
          DATABASE_URL_SYNC=postgresql+psycopg2://postgres:${DB_PASSWORD}@localhost:5432/sentry_db_test
          EVAL_LOG_DIR=./evaluation/logs
          TIKTOKEN_ENCODING=cl100k_base
          RAG_TOP_K=5
          RAG_CHUNK_SIZE=512
          RAG_CHUNK_OVERLAP=64
          LLM_MAX_TOKENS=1024
          LLM_TEMPERATURE=0.2
          EOF

      - name: Run knowledge base ingestion
        run: python scripts/ingest_knowledge_base.py

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: |
          pip install ruff==0.4.4

      - name: Ruff lint check
        run: ruff check . --ignore E501

      - name: Ruff format check
        run: ruff format --check .