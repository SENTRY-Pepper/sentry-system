name: SENTRY Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Integration test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: sentry_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env for CI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${OPENAI_API_KEY}
          LLM_MODEL=gpt-4
          EMBEDDING_MODEL=all-MiniLM-L6-v2
          CHROMA_PERSIST_DIR=./knowledge_base/vector_store
          CHROMA_COLLECTION_NAME=sentry_knowledge
          MIDDLEWARE_HOST=0.0.0.0
          MIDDLEWARE_PORT=8000
          DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@localhost:5432/sentry_db_test
          DATABASE_URL_SYNC=postgresql+psycopg2://postgres:${DB_PASSWORD}@localhost:5432/sentry_db_test
          EVAL_LOG_DIR=./evaluation/logs
          TIKTOKEN_ENCODING=cl100k_base
          RAG_TOP_K=5
          RAG_CHUNK_SIZE=512
          RAG_CHUNK_OVERLAP=64
          LLM_MAX_TOKENS=1024
          LLM_TEMPERATURE=0.2
          EOF

      - name: Ingest knowledge base
        run: python scripts/ingest_knowledge_base.py

      - name: Start middleware server
        env:
          PYTHONPATH: .
        run: |
          uvicorn middleware.main:app --host 0.0.0.0 --port 8000 &
          sleep 15

      - name: Run integration tests
        env:
          PYTHONPATH: .
        run: pytest tests/integration/ -v --tb=short